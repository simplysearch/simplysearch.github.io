<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SimplySearch</title>

<style>
* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: system-ui, sans-serif;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
}

.logo {
  display: block;
  margin: 0 auto 1rem;
  max-width: 1100px;
  width: 60%;
  height: auto;
}

@media (max-width: 500px) {
  .logo {
    width: 75%;
  }
}

.logo-btn {
  background: none;
  border: none;
  padding: 0;
  cursor: pointer;
}

.logo-btn:hover {
  opacity: 0.8;
}

.page {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
}

.wrapper {
  width: 100%;
  max-width: 500px;
  position: relative;
}

input {
  width: 100%;
  padding: 1rem 3.5rem 1rem 1rem;
  font-size: 1.1rem;
  border-radius: 999px;
  border: 2px solid #444;
}

.wrapper button {
  position: absolute;
  top: 50%;
  right: 6px;
  transform: translateY(-50%);
  height: 44px;
  width: 44px;
  border-radius: 50%;
  border: none;
  background: #444;
  color: white;
  cursor: pointer;
  transition: opacity 0.2s;
}

.wrapper button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.wrapper button:not(:disabled):hover {
  opacity: 0.8;
}

.note {
  font-size: 0.95rem;
  color: green;
  margin-top: 1rem;
  text-align: center;
}

.footer {
  font-size: 0.9rem;
  color: #666;
  margin-top: 0.5rem;
  text-align: center;
}
</style>
</head>

<body>
<div class="page">
  <button id="logoBtn" class="logo-btn" aria-label="Reset search">
    <img src="logo.png" alt="SimplySearch logo" class="logo">
  </button>
  <form id="form" class="wrapper">
    <input type="search" id="searchInput" placeholder="Search without AI summaries" aria-label="Search" autofocus>
    <button id="run" type="submit" aria-label="Search">
      <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" stroke-width="3" stroke="white" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path stroke="none" d="M0 0h24v24H0z" fill="none"></path>
        <path d="M5 12l14 0"></path>
        <path d="M13 18l6 -6"></path>
        <path d="M13 6l6 6"></path>
      </svg>
    </button>
  </form>
  <p class="note">Despite efficiency improvements, AI search result summaries are resource-intensive, likely using <a href="https://www.scientificamerican.com/article/what-do-googles-ai-answers-cost-the-environment/" target="_blank">orders of magnitude more energy</a> than a traditional search.</p>
  <p class="footer"><i>SimplySearch does not track your search queries - it has no database. You can view its simple source code on GitHub.</i></p>
</div>

<script>
const form = document.getElementById("form");
const input = document.getElementById("searchInput");
const btn = document.getElementById("run");
const logoBtn = document.getElementById("logoBtn");

logoBtn.addEventListener("click", () => {
  input.value = "";
  btn.disabled = true;
  input.focus();
});

function updateState() {
  btn.disabled = input.value.trim() === "";
}

updateState();

input.addEventListener("input", updateState);

form.addEventListener("submit", (e) => {
  e.preventDefault();
  const query = input.value.trim();
  if (!query) return;

  window.open(
    "https://www.google.com/search?q=" + encodeURIComponent(query + " -noai"), "_blank", "noopener"
  );
});
</script>

</body>
</html>
